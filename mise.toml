[tools]
lua = ["5.4.8", "5.5.0"]

# ── build ──────────────────────────────────────────────────────
[tasks."build:54"]
description = "Build C extensions for Lua 5.4"
run = "luarocks make cluacov-dev-1.rockspec"

[tasks."build:55"]
description = "Build C extensions for Lua 5.5"
run = "MISE_LUA_VERSION=5.5.0 mise exec -- luarocks make cluacov-dev-1.rockspec"

# ── unit tests ─────────────────────────────────────────────────
[tasks."test:54"]
description = "Build + unit tests on Lua 5.4"
run = """
luarocks make cluacov-dev-1.rockspec
busted
"""

[tasks."test:55"]
description = "Build + unit tests on Lua 5.5"
run = "MISE_LUA_VERSION=5.5.0 mise exec -- bash -c 'luarocks make cluacov-dev-1.rockspec && busted'"

[tasks."test:all"]
description = "Build + unit tests on both Lua 5.4 and 5.5"
depends = ["test:54", "test:55"]

# ── e2e tests ──────────────────────────────────────────────────
[tasks."e2e:54"]
description = "Build local tree + E2E tests on Lua 5.4"
run = """
luarocks make cluacov-dev-1.rockspec --tree=.
./e2e/run_all.sh
"""

[tasks."e2e:55"]
description = "Build local tree + E2E tests on Lua 5.5"
run = "MISE_LUA_VERSION=5.5.0 mise exec -- bash -c 'luarocks make cluacov-dev-1.rockspec --tree=. && ./e2e/run_all.sh'"

[tasks."e2e:all"]
description = "E2E tests on both Lua 5.4 and 5.5"
depends = ["e2e:54", "e2e:55"]

# ── full check (unit + e2e, both versions) ─────────────────────
[tasks.check]
description = "Full build + unit + E2E on both Lua 5.4 and 5.5"
depends = ["test:all", "e2e:all"]

# ── AddressSanitizer (Linux + gcc) ─────────────────────────────
# Builds the cluacov C extensions with -fsanitize=address,undefined into
# the local --tree=. so the busted/e2e wiring (shared with the regular
# test tasks) keeps working unchanged. ASan's runtime must be the FIRST
# library loaded in the process, so the .so files are not self-sufficient
# — we LD_PRELOAD libasan when running the test binaries.
#
# The LSan suppressions file at spec/asan_lsan_suppressions.txt filters
# out leaks coming from third-party binaries (gcc, bash, sort, etc.) that
# get spawned as subprocesses of busted / e2e runners and inherit the
# preload. It does NOT suppress anything inside cluacov.
[tasks."asan:54"]
description = "Build cluacov + busted + e2e under ASan/UBSan on Lua 5.4"
run = """
bash -c '
set -eu

ASAN_LIB="${ASAN_LIB:-$(gcc -print-file-name=libasan.so)}"
if [ ! -e "$ASAN_LIB" ]; then
  echo "asan: cannot locate libasan.so (got $ASAN_LIB). Install gcc with ASan support." >&2
  exit 1
fi

export CFLAGS="-O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer -fno-common"
export LDFLAGS="-fsanitize=address,undefined"
luarocks make cluacov-dev-1.rockspec --tree=.

unset CFLAGS LDFLAGS

# Make the local --tree=. visible to busted and to any subprocess it
# spawns via io.popen / os.execute (e.g. runner_spec config-loading tests).
eval "$(luarocks --lua-version=5.4 --tree=. path)"

export ASAN_OPTIONS="abort_on_error=0:halt_on_error=0:detect_leaks=1:print_stacktrace=1"
export LSAN_OPTIONS="suppressions=$PWD/spec/asan_lsan_suppressions.txt:print_suppressions=1"
export LD_PRELOAD="$ASAN_LIB"

echo "==> busted (ASan)"
busted

echo "==> e2e (ASan)"
./e2e/run_all.sh
'
"""

[tasks."asan:55"]
description = "Build cluacov + busted + e2e under ASan/UBSan on Lua 5.5"
run = """
MISE_LUA_VERSION=5.5.0 mise exec -- bash -c '
set -eu

ASAN_LIB="${ASAN_LIB:-$(gcc -print-file-name=libasan.so)}"
if [ ! -e "$ASAN_LIB" ]; then
  echo "asan: cannot locate libasan.so (got $ASAN_LIB). Install gcc with ASan support." >&2
  exit 1
fi

# Install busted into the local --tree=. against the 5.5 interpreter.
# A globally-installed busted under a different Lua version embeds a
# hardcoded path to the wrong lua binary in its shebang, which causes
# an ABI mismatch (5.4 binary loading a .so built with 5.5 headers
# == SEGV).
luarocks install --tree=. busted

export CFLAGS="-O0 -g -fsanitize=address,undefined -fno-omit-frame-pointer -fno-common"
export LDFLAGS="-fsanitize=address,undefined"
luarocks make cluacov-dev-1.rockspec --tree=.

unset CFLAGS LDFLAGS

eval "$(luarocks --lua-version=5.5 --tree=. path)"

export ASAN_OPTIONS="abort_on_error=0:halt_on_error=0:detect_leaks=1:print_stacktrace=1"
export LSAN_OPTIONS="suppressions=$PWD/spec/asan_lsan_suppressions.txt:print_suppressions=1"
export LD_PRELOAD="$ASAN_LIB"

# Use the locally-installed busted so its shebang points at THIS run\\047s
# 5.5 interpreter, not whatever 5.4-tree busted is on the global PATH.
echo "==> busted (ASan)"
./bin/busted

echo "==> e2e (ASan)"
./e2e/run_all.sh
'
"""

[tasks."asan:all"]
description = "Build + ASan/UBSan unit + E2E on both Lua 5.4 and 5.5"
depends = ["asan:54", "asan:55"]

# Notes on the ASan workflow:
#
# - The .so files are linked with -fsanitize=address. ASan's runtime must
#   be the FIRST shared library in the process; loading libasan via
#   dlopen-after-main is unsupported. We therefore LD_PRELOAD libasan.so
#   when launching busted / the e2e runner.
#
# - LD_PRELOAD propagates into subprocesses that busted / e2e spawn via
#   io.popen / os.execute (gcc, /bin/bash, /usr/bin/sort, ...). Those
#   third-party tools have their own small at-exit leaks; we filter them
#   out via spec/asan_lsan_suppressions.txt. The suppressions DO NOT
#   match anything in cluacov's own code.
#
# - asan:55 needs busted installed into the local --tree=. so that
#   busted's shebang resolves to the matching 5.5 lua binary (avoids
#   ABI-mismatch SEGVs that come from a 5.4-tree busted executing a
#   .so built with 5.5 headers).
