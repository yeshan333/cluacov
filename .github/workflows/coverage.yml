name: coverage

on:
  push:
    branches: master
  pull_request:
    branches: '*'

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Checkout luacov
      uses: actions/checkout@master
      with:
        repository: lunarmodules/luacov
        path: luacov-src
        ref: master

    - uses: luarocks/gh-actions-lua@master
      with:
        luaVersion: "5.5"

    - uses: luarocks/gh-actions-luarocks@master
      with:
        luaRocksVersion: "3.13.0"

    - name: Install dependencies
      run: |
        cd luacov-src && luarocks make && cd ..
        luarocks make

    - name: Install lcov
      run: sudo apt-get install -y lcov

    - name: Run all E2E scenarios
      run: bash e2e/run_all.sh

    - name: Generate Step Summary
      run: |
        set -e
        LCOV_FILE=e2e/output/coverage.lcov

        LF=$(grep -m1 '^LF:' "$LCOV_FILE" | cut -d: -f2)
        LH=$(grep -m1 '^LH:' "$LCOV_FILE" | cut -d: -f2)
        FNF=$(grep -m1 '^FNF:' "$LCOV_FILE" | cut -d: -f2)
        FNH=$(grep -m1 '^FNH:' "$LCOV_FILE" | cut -d: -f2)
        BRF=$(grep -m1 '^BRF:' "$LCOV_FILE" | cut -d: -f2)
        BRH=$(grep -m1 '^BRH:' "$LCOV_FILE" | cut -d: -f2)

        LINE_PCT=$(awk "BEGIN { printf \"%.1f\", ($LH/$LF)*100 }")
        FUNC_PCT=$(awk "BEGIN { printf \"%.1f\", ($FNH/$FNF)*100 }")
        BR_PCT=$(awk "BEGIN { printf \"%.1f\", ($BRH/$BRF)*100 }")

        {
          echo "## 📊 cluacov Branch Coverage Report"
          echo ""
          echo "Generated by \`e2e/e2e_branch_coverage.lua\` on the demo source \`e2e/sample.lua\`."
          echo ""
          echo "### Overall metrics"
          echo ""
          echo "| Metric | Total | Hit | Coverage |"
          echo "|--------|------:|----:|---------:|"
          echo "| Lines | $LF | $LH | $LINE_PCT% |"
          echo "| Functions | $FNF | $FNH | $FUNC_PCT% |"
          echo "| Branches | $BRF | $BRH | $BR_PCT% |"
          echo ""
          echo "### 🎨 Lua language constructs exercised"
          echo ""
          echo "\`e2e/sample.lua\` is a self-contained showcase covering most"
          echo "common Lua control-flow & syntax patterns. Each is exercised"
          echo "**partially** by \`e2e/run_test.lua\` so the report shows a"
          echo "realistic mix of red & green — that's the point of the demo."
          echo ""
          echo "| # | Construct | Demo function | What it shows |"
          echo "|---|-----------|---------------|---------------|"
          echo "|  1 | \`if/elseif/else\`           | \`classify\`, \`fizzbuzz\`, \`classify_status\` | Multi-arm conditionals (incl. deep nesting) |"
          echo "|  2 | Single-arm \`if\`            | \`abs\`, \`clamp\`                          | Implicit fall-through path |"
          echo "|  3 | Numeric \`for\` (#t)         | \`sum\`                                   | Length operator + accumulator |"
          echo "|  4 | Numeric \`for\` w/ step      | \`for_step\`                              | Positive **and** negative step direction |"
          echo "|  5 | Generic \`for ipairs\`       | \`find\`                                  | Early \`return\` from loop |"
          echo "|  6 | Generic \`for pairs\`        | \`find_in_map\`                           | Iteration over key-value map |"
          echo "|  7 | \`while ... break\`          | \`while_break\`                           | Conditional break + post-loop branch |"
          echo "|  8 | \`repeat ... until\`         | \`repeat_until\`                          | Body-runs-once-first semantics |"
          echo "|  9 | \`goto continue\` (5.2+)     | \`sum_odd\`                               | Goto-based loop continuation |"
          echo " | 10 | Short-circuit \`or\`         | \`with_default\`, \`any_truthy\`           | Nil-coalescing default-value idiom |"
          echo " | 11 | Short-circuit \`and\`        | \`all_truthy\`                            | All-truthy guard |"
          echo " | 12 | Compound \`(a and b) or c\` | \`mixed_logic\`, \`ternary_max\`           | Lua's idiomatic ternary expression |"
          echo " | 13 | \`pcall\` error capture     | \`try_parse_int\`                         | Success vs. failure branch |"
          echo " | 14 | Vararg \`...\` + \`select\`  | \`count_args\`                            | Variable-arity dispatch |"
          echo " | 15 | Multiple return values    | \`safe_div\`, \`divmod\`                   | Multi-value destructuring + error tuple |"
          echo " | 16 | Closure + upvalue         | \`make_counter\`                          | Factory pattern, captured local state |"
          echo " | 17 | Direct recursion          | \`factorial\`                             | Base case + recursive case |"
          echo " | 18 | Mutual recursion          | \`is_even\` / \`is_odd\`                   | Forward-declared local pair |"
          echo " | 19 | Dispatch table            | \`dispatch\`                              | String-keyed function table + fallback |"
          echo " | 20 | Metatable \`__index\`       | \`Point.new\`, \`Point:translate\`         | Class-like OOP with colon-syntax method |"
          echo " | 21 | \`table.concat\` join       | \`join\`                                  | Empty-vs-non-empty branch |"
          echo " | 22 | Function-body first line  | \`first_line_local\`                      | 🐛 Regression for \`savedpc\` off-by-one bug |"
          echo " | 23 | If-block first line       | \`if_block_first_line\`                   | 🐛 Regression for \`savedpc\` off-by-one bug |"
          echo ""
          echo "### 🔬 E2E scenarios run"
          echo ""
          echo "| Script | What it tests |"
          echo "|--------|---------------|"
          echo "| \`e2e_branch_coverage.lua\` | Per-PC branch analysis → LCOV → genhtml full pipeline |"
          echo "| \`e2e_line_hook.lua\`       | Legacy line-mode hook (\`hook.c\`) for Lua 5.1+/LuaJIT |"
          echo "| \`e2e_runner_shutdown.lua\` | \`__gc\` finalizer shutdown path (SIGSEGV regression guard) |"
          echo "| \`e2e_tick_mode.lua\`       | Tick-mode \`save_stats\` callback for long-running processes |"
          echo "| \`e2e_coroutine.lua\`       | Coverage propagation across coroutine boundaries |"
          echo "| \`e2e_multi_source.lua\`    | Multi-file aggregation via \`get_all_*\` |"
          echo ""
          echo "### 📂 Artifacts"
          echo ""
          echo "- 📄 [Full HTML Report](https://yeshan333.github.io/cluacov/) (deployed to GitHub Pages on \`master\`)"
          echo "- 💾 \`coverage-report\` artifact (downloadable from this run): full HTML tree for all 3 reports + top-level index"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        # Upload the WHOLE output tree (all 3 HTML reports + the
        # top-level index.html generated by run_all.sh) so reviewers
        # can browse every scenario, not just branch_coverage.
        path: e2e/output/

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: coverage
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download coverage artifact
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: html

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload to Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: html

    - name: Deploy to Pages
      id: deployment
      uses: actions/deploy-pages@v4
