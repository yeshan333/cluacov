name: test

on:
  push:
    branches: master
  pull_request:
    branches: '*'

jobs:
  TestMatrix:
    strategy:
      fail-fast: false
      matrix:
        luaVersion: ["5.1", "5.2", "5.3", "5.4", "5.5", "luajit"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@master

    - name: Checkout luacov
      uses: actions/checkout@master
      with:
        repository: lunarmodules/luacov
        path: luacov-src
        ref: master

    - uses: ilammy/msvc-dev-cmd@v1
      if: ${{ ! contains(matrix.luaVersion, 'luajit') }}

    - uses: luarocks/gh-actions-lua@master
      with:
        luaVersion: ${{ matrix.luaVersion }}

    - uses: luarocks/gh-actions-luarocks@master
      with:
        luaRocksVersion: "3.13.0"

    - name: Install luacov from its repository
      working-directory: luacov-src
      run: luarocks make

    - name: Prep
      run: |
        luarocks install busted
        luarocks install busted-htest
        luarocks make

    - name: Tests
      run: |
        busted -o htest
