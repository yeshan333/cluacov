<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" width="960" height="800">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="800" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">New cluacov: Per-Instruction Coverage (LUA_MASKCOUNT)</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#6b7280">Lua 5.4+ only (requires CallInfo.u.l.savedpc)</text>
  <g transform="translate(0, 80)">
    <rect x="60" y="0" width="840" height="70" rx="8" ry="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#6b7280" font-weight="600">USER CODE</text>
    <rect x="380" y="25" width="200" height="36" rx="6" ry="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="48" text-anchor="middle" font-size="13" fill="#111827">test.lua (Lua source)</text>
  </g>
  <g transform="translate(0, 175)">
    <rect x="60" y="0" width="840" height="160" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#2563eb" font-weight="600">LUA VM (5.4+)</text>
    <rect x="100" y="30" width="340" height="110" rx="8" ry="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="270" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">pchook.c: pc_hook(lua_State *L)</text>
    <text x="270" y="72" text-anchor="middle" font-size="12" fill="#6b7280">lua_sethook(L, pc_hook, LUA_MASKCOUNT, 1)</text>
    <text x="270" y="92" text-anchor="middle" font-size="12" fill="#6b7280">Fires every VM instruction (count=1)</text>
    <text x="270" y="112" text-anchor="middle" font-size="11" fill="#9ca3af">Proto* + CallInfo.u.l.savedpc -> registry[Proto*][pc]++</text>
    <rect x="560" y="30" width="280" height="50" rx="6" ry="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="700" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#ea580c">Tick Support (optional)</text>
    <text x="700" y="68" text-anchor="middle" font-size="11" fill="#6b7280">LUA_MASKLINE + savestepsize -> periodic save</text>
    <rect x="560" y="90" width="280" height="50" rx="6" ry="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="700" y="110" text-anchor="middle" font-size="12" fill="#6b7280">registry[PCHOOK_KEY][Proto*][pc]</text>
    <text x="700" y="128" text-anchor="middle" font-size="11" fill="#9ca3af">per-instruction hit counts</text>
  </g>
  <line x1="480" y1="150" x2="480" y2="175" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="490" y="154" width="65" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="522" y="166" text-anchor="middle" font-size="10" fill="#6b7280">execute</text>
  <g transform="translate(0, 360)">
    <rect x="60" y="0" width="840" height="100" rx="8" ry="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#7c3aed" font-weight="600">STATIC ANALYSIS (same as old)</text>
    <rect x="120" y="28" width="240" height="58" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">deepbranches.c</text>
    <text x="240" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Scan bytecode -&gt; branch sites</text>
    <rect x="460" y="28" width="200" height="58" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="560" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">deepactivelines.c</text>
    <text x="560" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Scan bytecode -&gt; active lines</text>
  </g>
  <line x1="270" y1="335" x2="270" y2="360" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <g transform="translate(0, 485)">
    <rect x="60" y="0" width="840" height="150" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#16a34a" font-weight="600">COVERAGE ANALYSIS</text>
    <rect x="120" y="30" width="300" height="100" rx="8" ry="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="270" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">branchcov.lua</text>
    <text x="270" y="74" text-anchor="middle" font-size="12" fill="#6b7280">deepbranches.get(func)</text>
    <text x="270" y="92" text-anchor="middle" font-size="12" fill="#6b7280">+ pchook.get_hits(func)</text>
    <text x="270" y="110" text-anchor="middle" font-size="12" fill="#6b7280">-&gt; per-target branch coverage</text>
    <rect x="560" y="30" width="260" height="100" rx="8" ry="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="690" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">runner.lua</text>
    <text x="690" y="74" text-anchor="middle" font-size="12" fill="#6b7280">pchook.get_all_line_hits()</text>
    <text x="690" y="92" text-anchor="middle" font-size="12" fill="#6b7280">pchook.get_all_hits()</text>
    <text x="690" y="110" text-anchor="middle" font-size="12" fill="#6b7280">-&gt; stats + LCOV output</text>
  </g>
  <line x1="360" y1="460" x2="360" y2="485" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="460" x2="600" y2="485" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <g transform="translate(0, 660)">
    <rect x="100" y="0" width="340" height="50" rx="8" ry="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
    <text x="270" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">luacov.stats.out (line hits)</text>
    <rect x="520" y="0" width="340" height="50" rx="8" ry="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
    <text x="690" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">lcov.info (line + branch data)</text>
  </g>
  <line x1="270" y1="635" x2="270" y2="660" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="690" y1="635" x2="690" y2="660" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <g transform="translate(660, 730)">
    <rect x="0" y="0" width="260" height="55" rx="6" ry="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="10" y="16" font-size="11" font-weight="600" fill="#dc2626">Limitations</text>
    <text x="10" y="32" font-size="10" fill="#6b7280">Lua 5.4+ only (not 5.1-5.3/LuaJIT)</text>
    <text x="10" y="46" font-size="10" fill="#6b7280">Higher event volume (fires every instruction)</text>
  </g>
  <g transform="translate(40, 485)">
    <rect x="0" y="0" width="12" height="100" rx="3" fill="#16a34a"/>
    <text x="18" y="16" font-size="10" fill="#16a34a" font-weight="600">Key difference:</text>
    <text x="18" y="30" font-size="10" fill="#6b7280">Each branch target PC has</text>
    <text x="18" y="44" font-size="10" fill="#6b7280">its own independent hit count.</text>
    <text x="18" y="58" font-size="10" fill="#6b7280">if a or b or c -&gt; 3 PCs,</text>
    <text x="18" y="72" font-size="10" fill="#6b7280">3 separate counts, no filter.</text>
  </g>
</svg>