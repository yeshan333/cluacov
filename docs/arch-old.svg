<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Old cluacov: Line-Level Coverage (LUA_MASKLINE)</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#6b7280">Lua 5.1 ~ 5.5, LuaJIT supported</text>
  <g transform="translate(0, 80)">
    <rect x="60" y="0" width="840" height="70" rx="8" ry="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#6b7280" font-weight="600">USER CODE</text>
    <rect x="380" y="25" width="200" height="36" rx="6" ry="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="48" text-anchor="middle" font-size="13" fill="#111827">test.lua (Lua source)</text>
  </g>
  <g transform="translate(0, 175)">
    <rect x="60" y="0" width="840" height="120" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#2563eb" font-weight="600">LUA VM</text>
    <rect x="300" y="30" width="360" height="75" rx="8" ry="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="480" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">lua_sethook(L, hook, LUA_MASKLINE, 0)</text>
    <text x="480" y="72" text-anchor="middle" font-size="12" fill="#6b7280">Fires once per executed source line</text>
    <text x="480" y="90" text-anchor="middle" font-size="11" fill="#9ca3af">Multiple bytecode instructions on same line = 1 hook call</text>
  </g>
  <line x1="480" y1="150" x2="480" y2="175" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <g transform="translate(0, 320)">
    <rect x="60" y="0" width="840" height="140" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#16a34a" font-weight="600">cluacov.hook (C)</text>
    <rect x="120" y="30" width="240" height="90" rx="8" ry="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">hook.c</text>
    <text x="240" y="72" text-anchor="middle" font-size="12" fill="#6b7280">l_debug_hook(lua_Debug *ar)</text>
    <text x="240" y="90" text-anchor="middle" font-size="11" fill="#6b7280">ar->currentline -> line_nr</text>
    <text x="240" y="108" text-anchor="middle" font-size="11" fill="#6b7280">data[filename][line_nr]++</text>
    <rect x="500" y="30" width="280" height="90" rx="8" ry="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="640" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Hit Table (Lua registry)</text>
    <text x="640" y="74" text-anchor="middle" font-size="12" fill="#6b7280">data["test"] = {</text>
    <text x="640" y="92" text-anchor="middle" font-size="12" fill="#6b7280">  [3] = 5,  [4] = 3,  [7] = 1,</text>
    <text x="640" y="110" text-anchor="middle" font-size="12" fill="#6b7280">  max = 7, max_hits = 5</text>
    <text x="640" y="124" text-anchor="middle" font-size="11" fill="#9ca3af">}</text>
  </g>
  <line x1="480" y1="295" x2="480" y2="320" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="490" y="300" width="72" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="526" y="312" text-anchor="middle" font-size="10" fill="#6b7280">line event</text>
  <g transform="translate(0, 485)">
    <rect x="60" y="0" width="840" height="100" rx="8" ry="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="70" y="18" font-size="11" fill="#7c3aed" font-weight="600">STATIC ANALYSIS</text>
    <rect x="120" y="28" width="240" height="58" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">deepbranches.c</text>
    <text x="240" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Scan bytecode -> branch sites</text>
    <rect x="460" y="28" width="200" height="58" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="560" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">deepactivelines.c</text>
    <text x="560" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Scan bytecode -> active lines</text>
    <rect x="730" y="28" width="150" height="58" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="805" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">branchfilter.lua</text>
    <text x="805" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Filter same-line targets</text>
  </g>
  <line x1="360" y1="460" x2="360" y2="485" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <rect x="370" y="466" width="120" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="430" y="478" text-anchor="middle" font-size="10" fill="#6b7280">cross-reference</text>
  <g transform="translate(0, 610)">
    <rect x="300" y="0" width="360" height="50" rx="8" ry="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
    <text x="480" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">luacov.stats.out (line hits)</text>
  </g>
  <line x1="480" y1="585" x2="480" y2="610" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <g transform="translate(660, 585)">
    <rect x="0" y="0" width="260" height="75" rx="6" ry="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="600" fill="#dc2626">Limitations</text>
    <text x="10" y="34" font-size="10" fill="#6b7280">Cannot distinguish sub-conditions</text>
    <text x="10" y="48" font-size="10" fill="#6b7280">if a or b or c -> 3 tests, 1 line hit</text>
    <text x="10" y="62" font-size="10" fill="#6b7280">Same-line branch targets filtered out</text>
  </g>
</svg>